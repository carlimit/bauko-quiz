<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="Brettsperrholz CLT kreuzweiser Aufbau">
  <rect width="420" height="300" fill="#f7f4ee"/>
  <text x="210" y="28" text-anchor="middle" font-family="system-ui,Arial" font-size="18" font-weight="700" fill="#3a2e1f">Brettsperrholz (CLT)</text>
  <text x="210" y="48" text-anchor="middle" font-family="system-ui,Arial" font-size="13" fill="#6b5a45">Lagen kreuzweise (90°) verleimt</text>
  <!-- Lage 1 (unten) längs -->
  <g>
    <rect x="70" y="200" width="280" height="34" fill="#d9b075" stroke="#7a5a2a" stroke-width="2"/>
    <g stroke="#a67c3d" stroke-width="1.5">
      <line x1="80" y1="209" x2="340" y2="209"/><line x1="80" y1="217" x2="340" y2="217"/><line x1="80" y1="225" x2="340" y2="225"/>
    </g>
    <text x="360" y="222" font-family="system-ui,Arial" font-size="12" fill="#3a2e1f">0°</text>
  </g>
  <!-- Lage 2 quer -->
  <g>
    <rect x="70" y="160" width="280" height="34" fill="#e7c896" stroke="#7a5a2a" stroke-width="2"/>
    <g stroke="#a67c3d" stroke-width="1.5">
      <line x1="95" y1="164" x2="95" y2="190"/><line x1="130" y1="164" x2="130" y2="190"/><line x1="165" y1="164" x2="165" y2="190"/>
      <line x1="200" y1="164" x2="200" y2="190"/><line x1="235" y1="164" x2="235" y2="190"/><line x1="270" y1="164" x2="270" y2="190"/><line x1="305" y1="164" x2="305" y2="190"/>
    </g>
    <text x="360" y="182" font-family="system-ui,Arial" font-size="12" fill="#3a2e1f">90°</text>
  </g>
  <!-- Lage 3 längs -->
  <g>
    <rect x="70" y="120" width="280" height="34" fill="#d9b075" stroke="#7a5a2a" stroke-width="2"/>
    <g stroke="#a67c3d" stroke-width="1.5">
      <line x1="80" y1="129" x2="340" y2="129"/><line x1="80" y1="137" x2="340" y2="137"/><line x1="80" y1="145" x2="340" y2="145"/>
    </g>
    <text x="360" y="142" font-family="system-ui,Arial" font-size="12" fill="#3a2e1f">0°</text>
  </g>
  <text x="210" y="270" text-anchor="middle" font-family="system-ui,Arial" font-size="12" fill="#6b5a45">→ trägt in beide Richtungen, gute Scheibenwirkung</text>
</svg>
