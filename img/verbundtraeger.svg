<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="Stahl-Beton-Verbundtraeger">
  <rect width="420" height="300" fill="#f7f4ee"/>
  <text x="210" y="26" text-anchor="middle" font-family="system-ui,Arial" font-size="17" font-weight="700" fill="#243b53">Stahl-Beton-Verbundträger</text>
  <!-- Betonplatte -->
  <rect x="70" y="70" width="280" height="46" fill="#cfcfcf" stroke="#8a8a8a" stroke-width="2"/>
  <g stroke="#9a9a9a" stroke-width="1"><circle cx="110" cy="93" r="3" fill="none"/><circle cx="160" cy="93" r="3" fill="none"/><circle cx="260" cy="93" r="3" fill="none"/><circle cx="310" cy="93" r="3" fill="none"/></g>
  <text x="360" y="98" font-family="system-ui,Arial" font-size="12" fill="#243b53">Beton</text>
  <!-- Kopfbolzen -->
  <g fill="#c0392b">
    <rect x="150" y="112" width="6" height="14"/><rect x="146" y="108" width="14" height="5"/>
    <rect x="205" y="112" width="6" height="14"/><rect x="201" y="108" width="14" height="5"/>
    <rect x="260" y="112" width="6" height="14"/><rect x="256" y="108" width="14" height="5"/>
  </g>
  <text x="150" y="150" font-family="system-ui,Arial" font-size="11" fill="#c0392b">Kopfbolzen (Verbundmittel)</text>
  <!-- Stahlträger I-Profil -->
  <g fill="#5a6b7d">
    <rect x="150" y="126" width="120" height="10"/>            <!-- Obergurt -->
    <rect x="205" y="136" width="10" height="90"/>             <!-- Steg -->
    <rect x="150" y="226" width="120" height="10"/>            <!-- Untergurt -->
  </g>
  <text x="278" y="185" font-family="system-ui,Arial" font-size="12" fill="#243b53">Stahlprofil (z.B. HEA)</text>
  <text x="210" y="270" text-anchor="middle" font-family="system-ui,Arial" font-size="12" fill="#6b5a45">Kopfbolzen übertragen Schubkraft → Verbundwirkung</text>
</svg>
