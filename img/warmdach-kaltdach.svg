<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" role="img" aria-label="Warmdach und Kaltdach">
  <rect width="420" height="320" fill="#f7f4ee"/>
  <text x="210" y="24" text-anchor="middle" font-family="system-ui,Arial" font-size="17" font-weight="700" fill="#243b53">Flachdach: Warm- vs. Kaltdach</text>
  <!-- Warmdach -->
  <text x="110" y="52" text-anchor="middle" font-family="system-ui,Arial" font-size="13" font-weight="600" fill="#3a2e1f">Warmdach (nicht belüftet)</text>
  <g stroke="#7a5a2a" stroke-width="1.5">
    <rect x="35" y="60" width="150" height="16" fill="#3b3b3b"/>            <!-- Abdichtung -->
    <rect x="35" y="76" width="150" height="34" fill="#f0d878"/>            <!-- Dämmung -->
    <rect x="35" y="110" width="150" height="12" fill="#7fae7f"/>           <!-- Dampfsperre -->
    <rect x="35" y="122" width="150" height="24" fill="#b9b9b9"/>           <!-- Tragschicht -->
  </g>
  <text x="195" y="72" font-family="system-ui,Arial" font-size="10" fill="#243b53">Abdichtung</text>
  <text x="195" y="97" font-family="system-ui,Arial" font-size="10" fill="#243b53">Wärmedämmung</text>
  <text x="195" y="120" font-family="system-ui,Arial" font-size="10" fill="#243b53">Dampfsperre</text>
  <text x="195" y="138" font-family="system-ui,Arial" font-size="10" fill="#243b53">Tragschicht</text>
  <!-- Kaltdach -->
  <text x="110" y="188" text-anchor="middle" font-family="system-ui,Arial" font-size="13" font-weight="600" fill="#3a2e1f">Kaltdach (belüftet)</text>
  <g stroke="#7a5a2a" stroke-width="1.5">
    <rect x="35" y="196" width="150" height="14" fill="#3b3b3b"/>            <!-- obere Schale + Abdichtung -->
    <rect x="35" y="210" width="150" height="22" fill="#ffffff"/>           <!-- Luftschicht -->
    <rect x="35" y="232" width="150" height="30" fill="#f0d878"/>           <!-- Dämmung -->
    <rect x="35" y="262" width="150" height="20" fill="#b9b9b9"/>           <!-- Tragschicht -->
  </g>
  <g stroke="#3b6cb0" stroke-width="1.5" marker-end="url(#a2)">
    <line x1="60" y1="221" x2="90" y2="221"/><line x1="120" y1="221" x2="150" y2="221"/>
  </g>
  <defs><marker id="a2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L6,3.5 L0,7 Z" fill="#3b6cb0"/></marker></defs>
  <text x="195" y="206" font-family="system-ui,Arial" font-size="10" fill="#243b53">Dachschale/Abdichtung</text>
  <text x="195" y="225" font-family="system-ui,Arial" font-size="10" fill="#3b6cb0">Luftschicht (Belüftung)</text>
  <text x="195" y="250" font-family="system-ui,Arial" font-size="10" fill="#243b53">Wärmedämmung</text>
  <text x="195" y="276" font-family="system-ui,Arial" font-size="10" fill="#243b53">Tragschicht</text>
  <text x="210" y="305" text-anchor="middle" font-family="system-ui,Arial" font-size="11" fill="#6b5a45">Kaltdach hat eine belüftete Luftschicht, Warmdach nicht</text>
</svg>
